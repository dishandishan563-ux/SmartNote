name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Node.js 24 ওয়ার্নিং দূর করার জন্য এই লাইনটি জরুরি
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: npm run build
        env:
          # আপনার এআই কি (AI Key) এখানে কাজ করবে
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # আপনার অ্যাপের নাম এবং আইডি এখানে সেট করা হয়েছে
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.smartnote.app",
            "appName": "SmartNote",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF
          
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartNote-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
